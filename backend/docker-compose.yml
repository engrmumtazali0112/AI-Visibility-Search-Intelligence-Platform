version: "3.9"

services:
  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-change-me}
      - DATABASE_URL=sqlite:///data/prod.db
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-http://localhost:5173}
    volumes:
      - api-data:/app/data
    env_file:
      - .env

volumes:
  api-data:
